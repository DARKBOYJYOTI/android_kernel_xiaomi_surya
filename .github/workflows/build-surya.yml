name: Build Surya Kernel for Droidspaces

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Work Space
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison \
          gperf build-essential zip curl zlib1g-dev \
          libxml2-utils bzip2 libbz2-dev \
          squashfs-tools schedtool dpkg-dev liblz4-tool \
          make libssl-dev pwgen \
          bc libncurses-dev libelf-dev \
          xsltproc unzip \
          clang-18 llvm-18 llvm-18-tools python3 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Setup Clang 18 as default
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-18 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100
          sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-18 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-18 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-18 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-18 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-18 100

      - name: Clone Kernel Source
        run: |
          # Use the known cooler/stable BaikalOS source commit.
          git clone --depth=1 https://github.com/baikalos/android_kernel_xiaomi_surya.git kernel-source
          git -C kernel-source fetch --depth=1 origin 0d9f41cd151f3d713ca392d8942938cb7d104623
          git -C kernel-source checkout --detach FETCH_HEAD
          git -C kernel-source rev-parse HEAD > baikal-source-commit.txt

      - name: Apply Droidspaces Patches
        run: |
          cd kernel-source

          # Apply only the patches that match the current BaikalOS source tree.
          if [ -f net/netfilter/xt_qtaguid.c ]; then
            git apply --check "$GITHUB_WORKSPACE/patches/01.fix_kernel_panic_in_xt_qtaguid.patch"
            git apply "$GITHUB_WORKSPACE/patches/01.fix_kernel_panic_in_xt_qtaguid.patch"
          else
            printf '%s\n' 'Skipping xt_qtaguid patch: file not present in current source tree'
          fi

          if [ -f kernel/cgroup/cgroup.c ]; then
            if ! grep -q 'CGRP_ROOT_NOPREFIX' kernel/cgroup/cgroup.c; then
              perl -0pi -e 's@\n\treturn 0;@\n\n\tif (cft->ss && (cgrp->root->flags & CGRP_ROOT_NOPREFIX) && !(cft->flags & CFTYPE_NO_PREFIX)) {\n\t\tsnprintf(name, CGROUP_FILE_NAME_MAX, "%s.%s", cft->ss->name, cft->name);\n\t\tkernfs_create_link(cgrp->kn, name, kn);\n\t}\n\n\treturn 0;@' kernel/cgroup/cgroup.c
            fi
          else
            printf '%s\n' 'Skipping cgroup prefix patch: file not present in current source tree'
          fi

      - name: Apply Droidspaces Config & Compile
        run: |
          cd kernel-source
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export HOSTCC=clang
          export HOSTCXX=clang++
          export LLVM=1
          export LLVM_IAS=1
          export KBUILD_BUILD_USER=darkboyjyoti
          export KBUILD_BUILD_HOST=ubuntu
            
          # 1. Run Defconfig
          make O=out \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1 \
            LLVM_IAS=1 \
            surya_defconfig
          
          # 2. Copy and Merge Droidspaces Config
          cp $GITHUB_WORKSPACE/droidspaces.config ./droidspaces.config
          ARCH=arm64 scripts/kconfig/merge_config.sh -O out out/.config ./droidspaces.config
          
          # 3. Force default configs (Prevent hanging)
          make O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1 \
            LLVM_IAS=1 \
            olddefconfig

          # 4. Verify VINTF-sensitive and Droidspaces-critical config results.
          grep -q '^# CONFIG_SYSVIPC is not set$' out/.config
          grep -q '^CONFIG_POSIX_MQUEUE=y$' out/.config
          grep -q '^CONFIG_PID_NS=y$' out/.config
          grep -q '^CONFIG_IPC_NS=y$' out/.config
          grep -q '^CONFIG_DEVTMPFS=y$' out/.config
          grep -q '^CONFIG_CGROUP_DEVICE=y$' out/.config
          grep -q '^CONFIG_CGROUP_PIDS=y$' out/.config
          grep -q '^CONFIG_FAIR_GROUP_SCHED=y$' out/.config
          grep -q '^CONFIG_CGROUP_NET_PRIO=y$' out/.config
          grep -q '^CONFIG_BRIDGE_NETFILTER=y$' out/.config
          grep -q '^CONFIG_NF_TABLES=y$' out/.config
          grep -q '^CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y$' out/.config
          grep -q '^CONFIG_IP_SET=y$' out/.config
          grep -q '^CONFIG_NETFILTER_NETLINK_QUEUE=y$' out/.config
          grep -q '^CONFIG_NETFILTER_NETLINK_LOG=y$' out/.config
          grep -q '^CONFIG_NETFILTER_XT_TARGET_NFLOG=y$' out/.config

          # 5. Compile kernel with Clang 18, no LTO for boot stability
          # Keep kernel default optimization policy for a stable release build.
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-Wno-error" \
            Image.gz

          cp out/.config "$GITHUB_WORKSPACE/final-surya.config"

          # 6. Try to stage dtbo.img separately if source already provides one.
          # Use prebuilt device tree if available
          if [ -f arch/arm64/boot/dtbo.img ]; then
            cp arch/arm64/boot/dtbo.img out/arch/arm64/boot/ 2>/dev/null || true
          fi

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Surya-Final-Droidspaces-Kernel
          path: |
            kernel-source/out/arch/arm64/boot/Image.gz
            final-surya.config
            baikal-source-commit.txt
            
