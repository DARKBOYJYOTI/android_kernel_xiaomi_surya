name: Build Surya Kernel for Droidspaces

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Work Space
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison \
          gperf build-essential zip curl zlib1g-dev \
          libxml2-utils bzip2 libbz2-dev \
          squashfs-tools schedtool dpkg-dev liblz4-tool \
          make libssl-dev pwgen \
          bc libncurses-dev libelf-dev \
          xsltproc unzip \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/baikalos/android_kernel_xiaomi_surya.git kernel-source

      - name: Fix DTS Syntax Error
        run: |
          cd kernel-source
          # Fix broken sdmmagpie-thermal-overlay.dtsi from LineageOS
          curl -sL https://raw.githubusercontent.com/LineageOS/android_kernel_xiaomi_surya/lineage-21/arch/arm64/boot/dts/qcom/sdmmagpie-thermal-overlay.dtsi \
            -o arch/arm64/boot/dts/qcom/sdmmagpie-thermal-overlay.dtsi

      - name: Apply Droidspaces Patches
        run: |
          cd kernel-source
          
          # Patch 1: Fix kernel panic in xt_qtaguid
          curl -sL https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch -o patch1.patch
          git apply patch1.patch || echo "Patch 1 may already be applied or conflicted"
          
          # Patch 2: Fix cgroup file prefix handling
          curl -sL "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch" -o patch2.patch
          git apply patch2.patch || echo "Patch 2 may already be applied or conflicted"

      - name: Apply Droidspaces Config & Compile
        run: |
          cd kernel-source
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # 1. Run Defconfig
          make O=out surya_defconfig
          
          # 2. Copy and Merge Droidspaces Config
          cp $GITHUB_WORKSPACE/droidspaces.config ./droidspaces.config
          ARCH=arm64 scripts/kconfig/merge_config.sh -O out out/.config ./droidspaces.config
          
          # 3. Force default configs (Prevent hanging)
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          
          # 4. Compile the kernel (THE FIX: Disabling -Werror to ignore petty warnings)
          # KCFLAGS="-w" disables all warnings entirely
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-O3 -pipe -gdwarf-4 -w -Wno-error" \
            KAFLAGS="-gdwarf-4"

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Surya-Final-Droidspaces-Kernel
          path: |
            kernel-source/out/arch/arm64/boot/Image.gz
            kernel-source/out/arch/arm64/boot/Image.gz-dtb
            kernel-source/out/arch/arm64/boot/dtbo.img
            
